name: flutter_template
description: "Flutter project template with Clean Architecture, Bloc/Cubit, go_router, GetIt, Dio."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  dio: 5.4.0
  pretty_dio_logger: 1.3.1
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  get_it: ^8.0.3
  go_router: ^14.2.7

  ifl: ^0.0.3
  intl: 0.20.2
  flutter_svg: ^2.0.10+1
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true